jenkins:
  systemMessage: "Managed by DevSecOps Agent"
  numExecutors: 4
  securityRealm:
    local:
      allowsSignup: false
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
